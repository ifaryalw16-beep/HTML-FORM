<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Form</title>
</head>
<body>
    <form>
        <div style="background-color: rgb(203, 253, 237); padding: 5px;">
        <h2 style="text-align: center;color: rgb(68, 68, 68);">Student Registration Form</h2>
        </div>
        <div style="border-radius: 5px;background-color: rgba(239, 244, 243, 0.962);padding: 20px;margin-top: 10px; box-shadow: 200px;">
        <label for="fname">First Name:</label><br>
        <input type="text" id="fname" name="fname" placeholder="First Name"><br>
        <label for="lname">Last Name:</label><br>
        <input type="text" id="lname" name="lname" placeholder="Last Name"><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Email"><br>
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Password"><br>
        <label for="city">City:</label><br>
        <input type="text" id="city" name="city" placeholder="City"><br>
       
<p>Gender:</p>
<input type="radio" id="Gender-male" name="gender" value="male">
<label for="Gender-male">Male</label><br>
<input type="radio" id="Gender-female" name="gender" value="female">
<label for="Gender-female">Female</label><br>
<input type="radio" id="Gender-other" name="gender" value="other">
<label for="Gender-other">Other</label><br>
<p>Hobbies:</p>
<input type="checkbox" id="hobby1" name="hobbies" value="reading">
<label for="hobby1">Reading</label><br>
<input type="checkbox" id="hobby2" name="hobbies" value="sports">
<label for="hobby2">Sports</label><br>
<input type="checkbox" id="hobby3" name="hobbies" value="music">
<label for="hobby3">Music</label><br>
<input type="checkbox" id="hobby4" name="hobbies" value="traveling">
<label for="hobby4">Coding</label><br>
        <input style="margin: 10px;background-color: rgb(198, 225, 223);" type="submit" value="Submit">
        </div>
    </form>
</body>
</html>
